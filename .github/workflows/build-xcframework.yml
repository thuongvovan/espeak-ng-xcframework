name: Build & Release XCFramework

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup build dependencies
        run: |
          brew install autoconf automake libtool

      - name: Build XCFramework
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh

      - name: Auto-generate version
        id: version
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.52.3+fork+${BUILD_DATE}.${COMMIT_COUNT}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "✅ Auto-generated version: ${VERSION}"
          echo "✅ Tag: ${TAG}"

      - name: Compress XCFramework
        run: |
          cd build
          tar -czf ESpeakNG.xcframework.tar.gz ESpeakNG.xcframework/
          ls -lh ESpeakNG.xcframework.tar.gz

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG already exists, skipping tag creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Auto-release: ${{ steps.version.outputs.version }}"
            git push origin "$TAG"
            echo "✅ Tag $TAG created and pushed"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: build/ESpeakNG.xcframework.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
