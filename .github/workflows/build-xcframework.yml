name: Build & Release XCFramework

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history để lấy tags

      - name: Setup build dependencies
        run: |
          brew install autoconf automake libtool

      - name: Build XCFramework
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh

      - name: Get version
        id: version
        run: |
          # Extract version from build_xcframework.sh or use git tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(grep "VERSION=" build_xcframework.sh | head -1 | cut -d'"' -f2)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Compress XCFramework
        run: |
          cd build
          tar -czf ESpeakNG.xcframework.tar.gz ESpeakNG.xcframework/
          ls -lh ESpeakNG.xcframework.tar.gz

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ESpeakNG.xcframework.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (on commit)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ESpeakNG-${{ steps.version.outputs.version }}
          path: build/ESpeakNG.xcframework.tar.gz
          retention-days: 30

      - name: Update Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "✅ XCFramework ${{ steps.version.outputs.version }} released successfully!"
          echo "📦 Available at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
