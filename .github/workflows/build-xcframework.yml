name: Build & Release XCFramework

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup build dependencies
        run: |
          brew install autoconf automake libtool

      - name: Build XCFramework
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Release tag: use tag as version
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Commit: auto-generate from build script
            BUILD_DATE=$(date +%Y%m%d)
            COMMIT_COUNT=$(git rev-list --count HEAD)
            VERSION="1.52.3+fork+${BUILD_DATE}.${COMMIT_COUNT}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Compress XCFramework
        run: |
          cd build
          tar -czf ESpeakNG.xcframework.tar.gz ESpeakNG.xcframework/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ESpeakNG.xcframework.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
